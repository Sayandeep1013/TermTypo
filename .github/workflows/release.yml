# .github/workflows/release.yml
#
# Triggered by: git tag v*.*.* + push
# Builds Windows .exe, macOS binary, Linux binary in parallel.
# Attaches all three to an auto-created GitHub Release.
#
# No secrets needed — GITHUB_TOKEN is provided automatically.
# PyPI publishing is intentionally manual via release.bat on the dev machine.

name: Build Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Windows .exe ─────────────────────────────────────────────────────────────
  build-windows:
    name: Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ./client

      - name: Build exe
        run: pyinstaller termtypo.spec --clean

      - name: Rename binary
        run: move dist\termtypo.exe dist\termtypo-windows.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termtypo-windows.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true

  # ── macOS binary ─────────────────────────────────────────────────────────────
  build-macos:
    name: macOS binary
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ./client

      - name: Build binary
        run: pyinstaller termtypo.spec --clean

      - name: Rename binary
        run: mv dist/termtypo dist/termtypo-macos

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termtypo-macos
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Linux binary ─────────────────────────────────────────────────────────────
  build-linux:
    name: Linux binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e ./client

      - name: Build binary
        run: pyinstaller termtypo.spec --clean

      - name: Rename binary
        run: mv dist/termtypo dist/termtypo-linux

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termtypo-linux
          token: ${{ secrets.GITHUB_TOKEN }}

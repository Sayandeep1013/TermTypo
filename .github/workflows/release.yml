# .github/workflows/release.yml
# Triggered by: git tag v*.*.* + push
# Builds Windows .exe, macOS binary, Linux binary in parallel.

name: Build Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    name: Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ./client

      - name: Verify entry point exists
        shell: pwsh
        run: python -c "import termtypo; print('termtypo OK')"

      - name: Build
        shell: pwsh
        run: pyinstaller termtypo.spec --clean --log-level WARN

      - name: Rename
        shell: pwsh
        run: Move-Item dist\termtypo.exe dist\termtypo-windows.exe

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termtypo-windows.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true

  build-macos:
    name: macOS binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ./client

      - name: Verify entry point exists
        run: python -c "import termtypo; print('termtypo OK')"

      - name: Build
        run: pyinstaller termtypo.spec --clean --log-level WARN

      - name: Rename
        run: mv dist/termtypo dist/termtypo-macos

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termtypo-macos
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ./client

      - name: Verify entry point exists
        run: python -c "import termtypo; print('termtypo OK')"

      - name: Build
        run: pyinstaller termtypo.spec --clean --log-level WARN

      - name: Rename
        run: mv dist/termtypo dist/termtypo-linux

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termtypo-linux
          token: ${{ secrets.GITHUB_TOKEN }}
